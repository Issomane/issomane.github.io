---
layout: default
---

<div class="section">
  <div class="container container--narrow">
    <header style="margin-bottom: var(--space-10); padding-bottom: var(--space-8); border-bottom: 1px solid var(--border-faint);">
      <h1 class="section-title">{{ page.title }}</h1>
      {% if page.description %}
        <p class="section-subtitle" style="margin-top: var(--space-3);">{{ page.description }}</p>
      {% endif %}
    </header>
    <div class="prose">
      {{ content }}
    </div>
  </div>
</div>

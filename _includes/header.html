<header class="site-nav" id="site-nav">
  <div class="container">
    <nav class="nav-inner">

      <!-- Logo -->
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        <div class="nav-logo-mark">
          {{ site.title | slice: 0 }}
        </div>
        <span class="nav-logo-text">{{ site.title }}</span>
      </a>

      <!-- Nav links -->
      <ul class="nav-links" id="nav-links">
        {% for link in site.nav_links %}
          <li>
            <a href="{{ link.url | relative_url }}"
               {% if page.url == link.url or page.url contains link.url and link.url != '/' %}class="active"{% endif %}>
              {{ link.title }}
            </a>
          </li>
        {% endfor %}
      </ul>

      <!-- CTA -->
      <div class="nav-cta">
        <a href="{{ '/contact/' | relative_url }}" class="btn btn-secondary btn-sm">Get in touch</a>
        <a href="{{ '/blog/' | relative_url }}" class="btn btn-primary btn-sm">Blog →</a>

        <!-- Mobile toggle -->
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

    </nav>
  </div>
</header>
